name: Update BiS Data & Release

on:
  schedule:
    - cron: '0 12 * * 3'
  workflow_dispatch:
    inputs:
      tier:
        description: 'SimC Tier (z.B. MID1)'
        required: false
        default: 'MID1'
      force_release:
        description: 'Release auch ohne Aenderungen erstellen'
        required: false
        type: boolean
        default: false

jobs:
  update-and-release:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'

      - name: Fetch SimC BiS Data
        run: |
          TIER="${{ github.event.inputs.tier || 'MID1' }}"
          echo "Fetching data for tier: $TIER"
          python tools/simc_updater.py \
            --tier "$TIER" \
            --output Data.lua
          echo "TIER=$TIER" >> $GITHUB_ENV

      - name: Check for changes
        id: changes
        run: |
          if git diff --quiet Data.lua 2>/dev/null; then
            echo "changed=false" >> $GITHUB_OUTPUT
            echo "Keine Aenderungen in Data.lua"
          else
            echo "changed=true" >> $GITHUB_OUTPUT
            echo "Data.lua hat sich geaendert!"
          fi

      - name: Commit updated Data.lua
        if: steps.changes.outputs.changed == 'true' || github.event.inputs.force_release == 'true'
        run: |
          git config user.name "BiS Buddy Bot"
          git config user.email "bisbuddy-bot@users.noreply.github.com"
          git add Data.lua
          git commit -m "chore: update BiS data from SimC ${{ env.TIER }} ($(date +%Y-%m-%d))" || true
          git push

      - name: Determine version
        if: steps.changes.outputs.changed == 'true' || github.event.inputs.force_release == 'true'
        id: version
        run: |
          VERSION=$(date +%Y.%-m.%-d)
          echo "version=$VERSION" >> $GITHUB_OUTPUT
          sed -i "s/@project-version@/$VERSION/g" BiSBuddy.toc

      - name: Package Addon
        if: steps.changes.outputs.changed == 'true' || github.event.inputs.force_release == 'true'
        run: |
          mkdir -p package/BiSBuddy
          cp BiSBuddy.toc Data.lua Core.lua package/BiSBuddy/
          cd package
          zip -r ../BiSBuddy-${{ steps.version.outputs.version }}.zip BiSBuddy/

      - name: Create GitHub Release
        if: steps.changes.outputs.changed == 'true' || github.event.inputs.force_release == 'true'
        uses: softprops/action-gh-release@v2
        with:
          tag_name: v${{ steps.version.outputs.version }}
          name: BiS Buddy v${{ steps.version.outputs.version }}
          body: |
            Automatisches Update der BiS-Daten aus SimulationCraft ${{ env.TIER }} Profilen.
          files: BiSBuddy-${{ steps.version.outputs.version }}.zip
          draft: false
          prerelease: false

      - name: Upload to CurseForge
        if: |
          (steps.changes.outputs.changed == 'true' || github.event.inputs.force_release == 'true')
          && env.CF_API_TOKEN != ''
        uses: BigWigsMods/packager@v2
        env:
          CF_API_KEY: ${{ secrets.CF_API_TOKEN }}
          GITHUB_OAUTH: ${{ secrets.GITHUB_TOKEN }}
        with:
          args: -p ${{ secrets.CF_PROJECT_ID }} -d

      - name: Summary
        if: always()
        run: |
          echo "## BiS Buddy Update Summary" >> $GITHUB_STEP_SUMMARY
          echo "" >> $GITHUB_STEP_SUMMARY
          if [ "${{ steps.changes.outputs.changed }}" == "true" ]; then
            echo "- Data.lua aktualisiert" >> $GITHUB_STEP_SUMMARY
            echo "- Version: ${{ steps.version.outputs.version }}" >> $GITHUB_STEP_SUMMARY
          else
            echo "- Keine Aenderungen erkannt" >> $GITHUB_STEP_SUMMARY
          fi
